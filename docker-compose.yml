services:
  gfm-serve:
    build:
      context: .
      dockerfile: ${DOCKERFILE_PATH:-services/vggt/Dockerfile}
      args:
        COMMON_BASE_IMAGE: ${GFM_COMMON_IMAGE:-gfm-serve-core:latest}
    image: ${SERVICE_IMAGE:-gfm-serve:vggt}
    restart: unless-stopped
    environment:
      GFM_SERVE_HOST: 0.0.0.0
      GFM_SERVE_PORT: ${SERVICE_PORT:-8000}
      GFM_SERVE_BACKEND: ${GFM_BACKEND:-vggt}
      GFM_SERVE_DATA_ROOT: /app/data/runs
      GFM_SERVE_MAX_IMAGES: ${GFM_SERVE_MAX_IMAGES:-32}
      GFM_SERVE_VGGT_MODEL_ID: ${GFM_SERVE_VGGT_MODEL_ID:-facebook/VGGT-1B}
      GFM_SERVE_VGGT_MODEL_REVISION: ${GFM_SERVE_VGGT_MODEL_REVISION:-main}
      GFM_SERVE_VGGT_DEFAULT_DEPTH_CONF_THRESHOLD: ${GFM_SERVE_VGGT_DEFAULT_DEPTH_CONF_THRESHOLD:-1.0}
      GFM_SERVE_DEPTH_ANYTHING_3_MODEL_ID: ${GFM_SERVE_DEPTH_ANYTHING_3_MODEL_ID:-depth-anything/DA3NESTED-GIANT-LARGE}
      GFM_SERVE_DEPTH_ANYTHING_3_MODEL_REVISION: ${GFM_SERVE_DEPTH_ANYTHING_3_MODEL_REVISION:-main}
      HF_HOME: /root/.cache/huggingface
      HUGGINGFACE_HUB_CACHE: /root/.cache/huggingface/hub
    ports:
      # Bind to one host interface instead of every interface. The wrapper
      # resolves this to the server's Tailscale IPv4 address by default.
      - "${GFM_SERVE_BIND_ADDRESS:-127.0.0.1}:${SERVICE_PORT:-8000}:${SERVICE_PORT:-8000}"
    volumes:
      - ./data:/app/data
      - huggingface-cache:/root/.cache/huggingface
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:${SERVICE_PORT:-8000}/healthz >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  huggingface-cache:
