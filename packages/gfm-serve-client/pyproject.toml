[project]
name = "gfm-serve-client"
version = "0.2.0"
description = "Typed Python client for VGGT and Depth Anything 3 GFM Serve services."
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27,<1",
    "numpy>=1.24,<3",
    "pydantic>=2.5,<3",
]

[project.optional-dependencies]
test = [
    "pytest>=8,<9",
]

[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
