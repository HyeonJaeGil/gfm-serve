name: gfm-serve-vggt-py312
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pytorch=2.3.1
  - torchvision=0.18.1
  - pytorch-cuda=12.1
  - blas=1.0=mkl
  - mkl
  - numpy<2
  - pillow
  - pip
  - pip:
      - -e ./packages/gfm-serve-core
      - -e ./services/vggt/upstream
      - -e ./services/vggt
